name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    branches: ["main", "release/**"]
    paths-ignore:
      - ".devcontainer/**"
      - ".github/**"
      - "!.github/workflows/claude-code-review.yml"
      - ".vscode/**"
      - "**.md"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Install GitHub CLI
        run: |
          # Check if gh is already installed
          if ! command -v gh &> /dev/null; then
            echo "Installing GitHub CLI..."
            type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          else
            echo "GitHub CLI is already installed"
            gh --version
          fi

      - name: Fix workspace permissions
        run: |
          # Ensure workspace directory exists
          mkdir -p "$GITHUB_WORKSPACE"
          # Fix permissions to avoid conflicts with Claude Code Action
          sudo chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE" || true
          # Mark as safe directory
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean up previous Claude Code review comments
        # Workaround for comment accumulation issue
        # See: https://github.com/anthropics/claude-code-action/issues/37
        # TODO: Remove this step when native comment update support is available
        uses: actions/github-script@v7
        with:
          script: |
            const params = {
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            };

            console.log('Fetching comments for PR #' + context.issue.number);
            const comments = await github.rest.issues.listComments(params);

            const botComments = comments.data.filter(comment =>
              comment.user.login === 'claude[bot]'
            );

            console.log(`Found ${botComments.length} comment(s) from claude[bot]`);

            for (const comment of botComments) {
              console.log(`Deleting comment ${comment.id}...`);
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id
              });
            }

            console.log('Cleanup complete!');

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: "${{ secrets.ANTHROPIC_BASE_URL }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          anthropic_api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
